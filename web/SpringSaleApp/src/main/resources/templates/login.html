<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Đăng nhập</title>
    <th:block th:replace="base :: resources"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container">
<!--        đây sẽ là form bình thường chứ ko phải form binding vì phần xử lý spring nó đã tự làm 
        mình chỉ cung cấp đúng phần name trong các thẻ input cho spring -->
        <form method="post" th:action="@{/admin/login}">
            <div class="form-floating mb-3 mt-3">
                <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập" name="username" />
                <label for="username">Tên đăng nhập</label>
            </div>
            <div class="form-floating mb-3 mt-3">
                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" name="password" />
                <label for="password">Mật khẩu</label>
            </div>
            <div class="form-floating mb-3 mt-3">
                <button type="submit" class="btn btn-success">Đăng nhập</button>
            </div>
        </form>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
