<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Quan Tri San Pham</title>
    <th:block th:replace="base :: resources"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container">
        <form method="post" th:object="${product}" enctype="multipart/form-data" th:action="@{/admin/products}">
            <div class="mb-3 mt-3">
                <input type="text" class="form-control" placeholder="Enter name" required="true" th:field="*{name}">
            </div>
            <div class="mb-3 mt-3">
                <input type="number" class="form-control" placeholder="Enter price"  th:field="*{price}">
            </div>

            <!--đối với trường khóa ngoại cũng dùng th:field ở đây để đóng gói nó thành 1 object chứ nếu gửi các thông tin lẻ như tên của cate -> spring sẽ chặn bắt lỗi bad request content-->
            <!--và cần phải thêm 1 cái formatter ở đây mình sẽ tạo riêng 1 gói cấu hình cho nó--> 
            <div class="mb-3 mt-3">
                <select class="form-select"  th:field="*{categoryId}"> 
                    <option th:each="c:${categories}" th:value="c.id" th:text="c.name"></option>
                </select>
            </div>

            <div class="mb-3 mt-3">
                <input type="file" th:field="*{file}" class="form-control" placeholder="Image">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
